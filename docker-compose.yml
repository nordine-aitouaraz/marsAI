version: '3.8'

services:
  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: marsAi   
      MYSQL_USER: festivalAi  
      MYSQL_PASSWORD: festivalAi
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8080:80"       # phpMyAdmin http://localhost:8080
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306

volumes:
  mariadb_data:
